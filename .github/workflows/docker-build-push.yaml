name: Build and Push Docker Image

on:
  push:
    tags:
      - '*'
      - '!v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get short SHA
        id: short_sha
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: |
            ghcr.io/pjaudiomv/kaniko-ci-toolkit
            pjaudiomv/kaniko-ci-toolkit
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=sha
          labels: |
            org.opencontainers.image.title="Kaniko CI Toolkit"
            org.opencontainers.image.description="Kaniko-powered CI build image with essential container tools"
            org.opencontainers.image.version="${{ github.ref_type == 'tag' && github.ref_name || steps.short_sha.outputs.SHA_SHORT }}"
            org.opencontainers.image.authors="pjaudiomv"
            org.opencontainers.image.licenses="MIT"
            org.opencontainers.image.documentation="https://github.com/pjaudiomv/kaniko-ci-toolkit/README.md"
          annotations: |
            org.opencontainers.image.title="Kaniko CI Toolkit"
            org.opencontainers.image.description="Kaniko-powered CI build image with essential container tools"
            org.opencontainers.image.version="${{ github.ref_type == 'tag' && github.ref_name || steps.short_sha.outputs.SHA_SHORT }}"
            org.opencontainers.image.authors="pjaudiomv"
            org.opencontainers.image.licenses="MIT"
            org.opencontainers.image.documentation="https://github.com/pjaudiomv/kaniko-ci-toolkit/README.md"
            org.opencontainers.image.source=https://github.com/pjaudiomv/kaniko-ci-toolkit
            org.opencontainers.image.revision="${ steps.short_sha.outputs.SHA_SHORT }}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/bake-action@v6
        with:
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file }}
          targets: toolkit
          push: ${{ github.event_name != 'pull_request' }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        if: github.event_name != 'pull_request'
        with:
          image-ref: 'ghcr.io/pjaudiomv/kaniko-ci-toolkit@${{ fromJSON(steps.build.outputs.metadata).toolkit[''containerimage.digest''] }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Sign images with Cosign
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ fromJSON(steps.build.outputs.metadata).toolkit['containerimage.digest'] }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
